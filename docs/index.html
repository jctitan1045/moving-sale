<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moving Sale — Medellín</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Moving Sale — Medellín</h1>
    <div class="controls">
      <select id="categoryFilter"></select>
      <button class="cart-toggle secondary" id="cartToggle">
        Cart <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </header>

  <main>
    <div class="grid" id="grid"></div>
  </main>

  <div class="overlay" id="overlay"></div>

  <div class="cart-drawer" id="cartDrawer">
    <button class="secondary" id="cartClose" style="align-self:flex-end;">Close ✕</button>
    <h2>Your cart</h2>
    <div id="cartItems"></div>

    <button id="whatsappBtn" class="whatsapp-btn" disabled>
      Chat on WhatsApp / Chatear por WhatsApp
    </button>
    <p class="whatsapp-hint">Opens WhatsApp with your cart pre-filled — just hit send. / Abre WhatsApp con tu carrito ya escrito, solo envíalo.</p>
  </div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
